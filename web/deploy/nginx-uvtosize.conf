# UVTOSIZE Nginx Configuration
# Place at: /etc/nginx/sites-available/uvtosize.conf (or append to existing server block)
#
# This config adds UVTOSIZE as a sub-path (liuzunyu.cn/uvtosize)
# to an existing Nginx server block.

# ============================================================
# Option A: Add to existing server block for liuzunyu.cn
# ============================================================
# Add these lines INSIDE the existing `server { ... }` block:

# --- UVTOSIZE Tool Page (static HTML) ---
location = /uvtosize {
    alias /var/www/liuzunyu/web/static/uvtosize.html;
}

# Serve uvtosize static assets (if any separate CSS/JS/JSON)
location /uvtosize/ {
    alias /var/www/liuzunyu/web/static/uvtosize/;
}

# --- UVTOSIZE API (proxy to Flask backend) ---
location /api/uvtosize/ {
    proxy_pass http://127.0.0.1:8765/api/uvtosize/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Increase timeout for file processing
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # Increase upload size limit (50 MB)
    client_max_body_size 50m;
}


